<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Tareas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Organizador de Tareas</h1>

    <!-- Ubicación -->
    <p id="location-text">Obteniendo ubicación...</p>

    <!-- Formulario para agregar tarea -->
    <div>
        <input type="text" id="task-input" placeholder="Nueva tarea...">
        <button id="add-task-btn">Agregar</button>
    </div>

    <!-- Kanban: dos columnas lado a lado -->
    <div class="kanban-container">
        <div id="pending-column" class="columna" data-status="pending">
            <h3>Pendientes</h3>
            <div id="pending-list" class="task-list"></div>
        </div>

        <div id="completed-column" class="columna" data-status="completed">
            <h3>Completadas</h3>
            <div id="completed-list" class="task-list"></div>
        </div>
    </div>

    <!-- Canvas -->
    <canvas id="task-canvas" width="340" height="170"></canvas>

    <script src="app.js"></script>
</body>
</html>
